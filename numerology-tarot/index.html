<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数秘術タロット</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --deep: #0d0b1a;
      --dark: #1a1628;
      --card-bg: #1e1a30;
      --purple: #6b4fa0;
      --purple-light: #9b7fd4;
      --text: #e8dfc8;
      --text-dim: #8a7a6a;
    }

    body {
      background: var(--deep);
      color: var(--text);
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 15% 65%, rgba(201,168,76,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 55% 45%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 85% 15%, rgba(201,168,76,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .title-area {
      text-align: center;
    }

    .title-area h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .title-area p {
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0.5rem auto;
    }

    .input-section {
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      box-shadow: 0 0 40px rgba(107,79,160,0.2);
    }

    .input-section label {
      display: block;
      margin-bottom: 0.8rem;
      color: var(--gold-light);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .date-input-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="date"], input[type="number"], input[type="text"] {
      flex: 1;
      min-width: 160px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      color-scheme: dark;
    }

    input[type="date"]:focus, input[type="number"]:focus, input[type="text"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(201,168,76,0.3);
    }

    .date-row { display: flex; align-items: center; gap: 0.5rem; }
    .date-group { display: flex; align-items: center; gap: 0.3rem; flex: 1; }
    .date-group input { width: 100%; min-width: 0; }
    .date-unit { font-size: 0.9rem; color: var(--dim, #888); white-space: nowrap; flex-shrink: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .btn {
      background: linear-gradient(135deg, #6b4fa0, #c9a84c);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      padding: 0.7rem 1.4rem;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(107,79,160,0.4);
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(107,79,160,0.6); }
    .btn:active { transform: translateY(0); }

    /* Calculation steps */
    .calc-steps {
      width: 100%;
      background: rgba(107,79,160,0.1);
      border: 1px solid rgba(107,79,160,0.3);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      font-size: 0.88rem;
      color: var(--text-dim);
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .calc-steps.show { display: block; }

    .calc-steps .step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      line-height: 1.6;
    }

    .calc-steps .step:last-child { margin-bottom: 0; }

    .step-arrow { color: var(--purple-light); }
    .step-highlight { color: var(--gold-light); font-weight: 700; }

    /* Result number */
    .result-number {
      font-family: 'Cinzel', serif;
      font-size: 5rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.7);
      line-height: 1;
      display: none;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    .result-number.show { display: block; }

    /* Tarot Card */
    .tarot-card-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: fadeSlideUp 0.6s ease 0.2s both;
    }

    .tarot-card-wrapper.show { display: flex; }

    .tarot-card {
      width: 240px;
      background: linear-gradient(160deg, #1e1a30, #2a2040);
      border: 2px solid var(--gold);
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 0 40px rgba(201,168,76,0.3), 0 0 80px rgba(107,79,160,0.2);
      position: relative;
      overflow: hidden;
    }

    .tarot-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      pointer-events: none;
    }

    .card-number {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .card-svg-area {
      width: 100%;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-svg-area svg {
      width: 100%;
      height: 100%;
    }

    .card-title-jp {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold-light);
      text-align: center;
      margin-top: 0.6rem;
      letter-spacing: 0.05em;
    }

    .card-title-en {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.12em;
      margin-top: 0.2rem;
    }

    .card-meaning {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text);
    }

    .card-meaning h3 {
      color: var(--gold);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      font-family: 'Cinzel', serif;
    }

    /* Animations */
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes popIn {
      from { transform: scale(0.5); opacity:0 }
      to   { transform: scale(1);   opacity:1 }
    }
    @keyframes fadeSlideUp {
      from { transform: translateY(30px); opacity:0 }
      to   { transform: translateY(0);    opacity:1 }
    }

    footer {
      color: var(--text-dim);
      font-size: 0.75rem;
      text-align: center;
      padding: 2rem 0 1rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>

// ─── Calculation ──────────────────────────────────────────────────────────────
function digitSum(n) {
  return n.toString().split('').reduce((s, d) => s + parseInt(d, 10), 0);
}

function calculate() {
  const raw = document.getElementById('birthInput').value.trim();
  if (!raw) { alert('生年月日を選択してください'); return; }
  const parts = raw.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!parts) { alert('生年月日を選択してください'); return; }
  const year  = parseInt(parts[1]);
  const month = parseInt(parts[2]);
  const day   = parseInt(parts[3]);
  if (year < 1800 || year > 2100 || month < 1 || month > 12 || day < 1 || day > 31) {
    alert('正しい日付を入力してください'); return;
  }

  // Collect only digits from the date
  const digits = String(year) + String(month).padStart(2,'0') + String(day).padStart(2,'0');

  // Step 1: sum all digits
  const steps = [];
  const initialDigits = digits.split('').join(' + ');
  let current = digits.split('').reduce((s, d) => s + parseInt(d, 10), 0);
  steps.push({ label: `${year}/${month}/${day} → ${initialDigits}`, result: current });

  // Keep reducing while > 22
  while (current > 22) {
    const prev = current;
    const parts = prev.toString().split('').join(' + ');
    current = digitSum(prev);
    steps.push({ label: `${prev} → ${parts}`, result: current });
  }

  // Render steps
  const stepsEl = document.getElementById('calcSteps');
  stepsEl.innerHTML = '';
  steps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    if (i === 0) {
      div.innerHTML = `<span class="step-arrow">✦</span> <span>${s.label} = <span class="step-highlight">${s.result}</span></span>`;
    } else {
      div.innerHTML = `<span class="step-arrow">→</span> <span>${s.label} = <span class="step-highlight">${s.result}</span></span>`;
    }
    stepsEl.appendChild(div);
  });
  if (steps.length === 1) {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = `<span class="step-arrow">✦</span> <span>合計 <span class="step-highlight">${current}</span> は22以下なのでそのまま確定</span>`;
    stepsEl.appendChild(div);
  } else {
    const last = document.createElement('div');
    last.className = 'step';
    last.style.marginTop = '0.4rem';
    last.style.borderTop = '1px solid rgba(107,79,160,0.3)';
    last.style.paddingTop = '0.4rem';
    last.innerHTML = `<span class="step-arrow">★</span> <span>あなたの数字: <span class="step-highlight" style="font-size:1.1em">${current}</span></span>`;
    stepsEl.appendChild(last);
  }
  stepsEl.classList.add('show');

  // Show result number
  const numEl = document.getElementById('resultNumber');
  numEl.textContent = current;
  numEl.classList.add('show');

  // Show card
  const card = CARDS[current];
  document.getElementById('cardNum').textContent = `— ${card.en.split(' ').map(w => w[0]).join('')} · ${String(current).padStart(2,'0')} —`;
  document.getElementById('cardSvg').innerHTML = card.svg;
  document.getElementById('cardTitleJp').textContent = card.jp;
  document.getElementById('cardTitleEn').textContent = card.en;
  document.getElementById('cardMeaning').innerHTML = `<h3>✦ カードのメッセージ</h3>${card.meaning}`;

  const wrapper = document.getElementById('cardWrapper');
  wrapper.classList.remove('show');
  void wrapper.offsetWidth; // reflow for animation
  wrapper.classList.add('show');

  // Scroll to result
  setTimeout(() => wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

// Set default date to today
(function() {
  const t = new Date();
  document.getElementById('birthInput').value =
    t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
})();
</script>
