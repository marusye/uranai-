    .header { text-align: center; }

    .animal-parade { font-size: 1.5rem; letter-spacing: 0.05em; margin: 0.8rem 0; opacity: 0.65; }
    .header p { color: var(--dim); font-size: 0.8rem; letter-spacing: 0.1em; }

    /* Input */
    .input-section { background: var(--card); border: 1px solid rgba(200,160,40,0.3); border-radius: 16px; padding: 1.8rem; width: 100%; box-shadow: 0 0 40px rgba(74,140,80,0.07); }
    .input-section label { display: block; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    input[type="date"] { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(200,160,40,0.4); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1rem; padding: 0.7rem 1rem; outline: none; transition: all 0.3s; color-scheme: dark; }
    input[type="date"]:focus { border-color: var(--gold); box-shadow: 0 0 12px rgba(200,160,40,0.3); }
    .btn { display: block; width: 100%; margin-top: 1.2rem; background: linear-gradient(135deg, #2a5a2a, #4a8c50, #2a5a2a); border: 1px solid rgba(74,140,80,0.6); border-radius: 8px; color: #fff; cursor: pointer; font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.3em; padding: 0.75rem; transition: all 0.2s; box-shadow: 0 2px 20px rgba(74,140,80,0.3); }

    .section-title { text-align: center; font-size: 0.85rem; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; justify-content: center; }

    .animal-keyword { font-size: 1rem; letter-spacing: 0.2em; margin-bottom: 1rem; font-weight: 700; }
    .animal-tagline { font-size: 0.88rem; opacity: 0.8; line-height: 1.9; color: var(--text); }

    .info-card p { font-size: 0.88rem; line-height: 1.95; }

    .trait-card { background: var(--card); border-radius: 12px; padding: 1.2rem; }

    .trait-card.weakness { border: 1px solid rgba(200,100,50,0.4); }

    .compat-label { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 0.4rem; }
    .compat-animals { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .compat-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.8rem; }
    .compat-badge.best { background: rgba(74,140,80,0.18); border: 1px solid rgba(74,140,80,0.5); color: #88d090; }
    .compat-badge.good { background: rgba(200,160,40,0.12); border: 1px solid rgba(200,160,40,0.4); color: #c8a028; }
    .compat-badge.caution { background: rgba(200,100,50,0.1); border: 1px solid rgba(200,100,50,0.35); color: #d88060; }

    .message-card { width: 100%; background: linear-gradient(135deg, rgba(74,140,80,0.1), rgba(200,160,40,0.07)); border: 1px solid rgba(200,160,40,0.3); border-radius: 16px; padding: 2rem 1.8rem; text-align: center; }

    footer { position: relative; z-index: 1; color: var(--dim); font-size: 0.72rem; text-align: center; padding-bottom: 2rem; letter-spacing: 0.08em; }
  </style>
</head>

function calcAnimalIndex(year, month, day) {
  const str = String(year).padStart(4,'0') + String(month).padStart(2,'0') + String(day).padStart(2,'0');
  let sum = str.split('').reduce((a, b) => a + parseInt(b), 0);
  while (sum > 36) {
    sum = String(sum).split('').reduce((a, b) => a + parseInt(b), 0);
  }
  return ((sum - 1) % 12) + 1; // 1〜12
}

function calcType(month, day) {
  return (month + day) % 2 === 0 ? 'night' : 'day';
}

function calculate() {
  const raw = document.getElementById('birthInput').value.trim();
  if (!raw) { alert('生年月日を選択してください'); return; }
  const parts = raw.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!parts) { alert('生年月日を選択してください'); return; }
  const y = parseInt(parts[1]);
  const m = parseInt(parts[2]);
  const d = parseInt(parts[3]);
  if (y < 1900 || y > 2100 || m < 1 || m > 12 || d < 1 || d > 31) {
    alert('正しい日付を入力してください'); return;
  }

  const idx = calcAnimalIndex(y, m, d);
  const a = ANIMALS[idx - 1];
  const typeName = calcType(m, d) === 'day' ? a.dayName : a.nightName;

  // Show sections
  document.querySelectorAll('.section').forEach(s => s.classList.add('show'));

  // Animal card
  document.getElementById('animalCard').innerHTML = `
    <div class="animal-card" style="border-color:${a.color};background:${a.bg};color:${a.color}">
      <span class="animal-emoji">${a.emoji}</span>
      <div class="animal-type-badge">${typeName}</div>
      <div class="animal-name" style="color:${a.color}">${a.name}</div>
      <div class="animal-en">${a.en}</div>
      <div class="animal-keyword" style="color:${a.color}">${a.keyword}</div>
      <div class="animal-tagline">${a.tagline}</div>
    </div>`;

  // Personality
  document.getElementById('personalityCard').innerHTML = `
    <h3>性格・特徴</h3><p>${a.personality}</p>`;

  // Traits
  document.getElementById('traitsGrid').innerHTML = `
    <div class="trait-card strength">
      <h3>✦ 長所</h3>
      <ul class="trait-list">${a.strengths.map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="trait-card weakness">
      <h3>▲ 注意点</h3>
      <ul class="trait-list">${a.weaknesses.map(w=>`<li>${w}</li>`).join('')}</ul>
    </div>`;

  // Love & Work
  document.getElementById('loveCard').innerHTML = `<h3>恋愛</h3><p>${a.love}</p>`;
  document.getElementById('workCard').innerHTML = `<h3>仕事・適職</h3><p>${a.work}</p>`;

  // Lucky
  document.getElementById('luckyCard').innerHTML = `
    <h3>ラッキー情報</h3>
    <div class="lucky-row">
      <div class="lucky-item">🎨 ${a.lucky_color}</div>
      <div class="lucky-item">🔢 ${a.lucky_number}</div>
      <div class="lucky-item">🍀 ${a.lucky_item}</div>
      <div class="lucky-item">📅 ${a.lucky_day}</div>
    </div>`;

  // Compatibility
  function compatBadges(ids, cls) {
    return ids.map(i => {
      const b = ANIMALS[i-1];
      return `<span class="compat-badge ${cls}">${b.emoji} ${b.name}</span>`;
    }).join('');
  }
  document.getElementById('compatCard').innerHTML = `
    <h3>他の動物との相性</h3>
    <div class="compat-group">
      <div class="compat-label">◎ 最高の相性</div>
      <div class="compat-animals">${compatBadges(a.best,'best')}</div>
    </div>
    <div class="compat-group">
      <div class="compat-label">○ 良い相性</div>
      <div class="compat-animals">${compatBadges(a.good,'good')}</div>
    </div>
    <div class="compat-group">
      <div class="compat-label">△ 要注意</div>
      <div class="compat-animals">${compatBadges(a.caution,'caution')}</div>
    </div>`;

  // Message
  document.getElementById('messageCard').innerHTML = `
    <span class="msg-emoji">${a.emoji}</span>
    <p>${a.message}</p>`;

  // Scroll to result
  setTimeout(() => {
    document.getElementById('animalSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}
